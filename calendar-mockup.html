<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>Scrambled Legs · Calendar Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg-deep:        #1a1a1a;
  --bg-elev:        #232325;
  --bg-card:        rgba(255,255,255,0.04);
  --bg-card-hover:  rgba(255,255,255,0.07);
  --border-soft:    rgba(255,255,255,0.10);
  --border-yolk:    rgba(255,199,44,0.25);
  --text:           #f4f4f4;
  --text-mute:      rgba(255,255,255,0.55);
  --text-dim:       rgba(255,255,255,0.32);
  --yolk:           #FFC72C;
  --yolk-light:     #FFE66D;
  --hot:            #FF6B6B;
  --hot-deep:       #FF8E53;
  --orange:         #FF8800;
  --green:          #6FCF97;
  --amber:          #FFB155;
  --shadow-card:    0 12px 40px rgba(0,0,0,0.35);
  --shadow-glow:    0 0 32px rgba(255,199,44,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: linear-gradient(160deg, #1a1a1a 0%, #232325 100%);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body { padding: 20px 16px 80px; }
@media (max-width: 480px) { body { padding: 12px 12px 80px; } }

/* ───────── floating eggs ───────── */
.egg {
  position: fixed; pointer-events: none; user-select: none;
  font-size: 28px; opacity: 0.12; z-index: 0;
  animation: floatEgg var(--dur,22s) ease-in-out infinite;
  animation-delay: var(--delay,0s);
}
@keyframes floatEgg {
  0%   { transform: translate(0,0) rotate(0deg); }
  33%  { transform: translate(12vw,-8vh) rotate(120deg); }
  66%  { transform: translate(-12vw,8vh) rotate(240deg); }
  100% { transform: translate(0,0) rotate(360deg); }
}

/* ───────── page wrapper ───────── */
.page { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; }

.page-header { text-align: center; padding: 8px 0 24px; }
.page-header h1 {
  font-family: 'Fredoka',sans-serif;
  font-size: clamp(22px,5.5vw,28px);
  font-weight: 700;
  letter-spacing: 0.02em;
  background: linear-gradient(45deg, var(--yolk-light), var(--yolk));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.page-header p {
  font-family: 'Montserrat',sans-serif;
  font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text-mute); margin-top: 4px;
}

/* ───────── section labels ───────── */
.section-label {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Montserrat',sans-serif;
  font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-mute);
  margin: 28px 4px 12px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border-soft), transparent);
}

/* ───────── featured card ───────── */
.featured {
  position: relative;
  background: linear-gradient(140deg, rgba(255,199,44,0.06), rgba(255,107,107,0.04));
  border: 1px solid var(--border-yolk);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: var(--shadow-card), var(--shadow-glow);
  backdrop-filter: blur(10px);
}
.featured-map { position: relative; height: 200px; background: var(--bg-deep); z-index: 1; }
.featured-map .leaflet-container { width: 100%; height: 100%; background: var(--bg-deep); border-radius: 0; }
.featured-map::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(180deg, transparent 60%, rgba(26,26,26,0.85) 100%);
  pointer-events: none;
  z-index: 2;
}

.status-chip {
  position: absolute; top: 14px; left: 14px; z-index: 20;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-family: 'Montserrat',sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.18);
}
.status-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
.status-chip[data-status="upcoming"]   { background: rgba(255,199,44,0.18); color: var(--yolk-light); }
.status-chip[data-status="upcoming"] .dot   { background: var(--yolk); box-shadow: 0 0 8px var(--yolk); animation: pulse 1.6s infinite; }
.status-chip[data-status="in_progress"] { background: rgba(111,207,151,0.18); color: var(--green); }
.status-chip[data-status="in_progress"] .dot { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.2s infinite; }
.status-chip[data-status="beers"]       { background: rgba(255,177,85,0.18); color: var(--amber); }
.status-chip[data-status="beers"] .dot       { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: pulse 2s infinite; }
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%     { transform: scale(1.4); opacity: 0.55; }
}

.weather-chip {
  position: absolute; top: 14px; right: 14px; z-index: 20;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px 6px 8px; border-radius: 999px;
  background: rgba(0,0,0,0.45); border: 1px solid var(--border-soft);
  backdrop-filter: blur(8px);
  font-size: 12px; font-weight: 600; color: var(--text);
}

.featured-body { padding: 18px 18px 14px; }

.event-name {
  font-family: 'Fredoka',sans-serif;
  font-size: clamp(22px,6vw,28px);
  font-weight: 700; line-height: 1.15;
  background: linear-gradient(45deg, #ffffff, #f0d97a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.event-meta {
  display: flex; flex-wrap: wrap; gap: 8px 14px;
  margin-top: 10px;
  font-size: 13px; color: var(--text-mute); font-weight: 500;
}
.event-meta span { display: inline-flex; align-items: center; gap: 6px; }
.event-meta svg { width: 14px; height: 14px; color: var(--yolk); flex-shrink: 0; }

.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.tag {
  font-family: 'Inter',sans-serif;
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 999px;
  background: rgba(255,199,44,0.10);
  border: 1px solid var(--border-yolk);
  color: var(--yolk-light);
}
.tag.diff-race  { background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.30); color: #ffb3b3; }
.tag.diff-chill { background: rgba(111,207,151,0.10); border-color: rgba(111,207,151,0.30); color: #b6e9cb; }
.tag.diff-work  { background: rgba(255,177,85,0.10); border-color: rgba(255,177,85,0.30); color: #ffd2a3; }

.event-desc {
  font-size: 14px; line-height: 1.55;
  color: rgba(255,255,255,0.78); margin-top: 14px;
}

/* ───────── countdown ───────── */
.countdown-block {
  margin-top: 18px; padding: 14px 14px 12px;
  border-radius: 14px;
  background: rgba(0,0,0,0.30);
  border: 1px solid var(--border-soft);
  text-align: center;
}
.countdown-label {
  font-family: 'Montserrat',sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-mute); margin-bottom: 6px;
}
.countdown-display {
  font-family: 'Fredoka',sans-serif;
  font-weight: 600;
  font-size: clamp(20px,5vw,26px);
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  background: linear-gradient(45deg, var(--yolk-light), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.countdown-display .sep { color: var(--text-dim); margin: 0 6px; -webkit-text-fill-color: var(--text-dim); }
.countdown-display.is-progress { background: linear-gradient(45deg, var(--green), #b6e9cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.countdown-display.is-beers    { background: linear-gradient(45deg, var(--amber), #ffd2a3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* ───────── action row ───────── */
.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  font-family: 'Inter',sans-serif;
  font-size: 13px; font-weight: 600;
  padding: 12px 14px; border-radius: 12px;
  border: 1px solid var(--border-soft);
  background: var(--bg-card); color: var(--text);
  cursor: pointer; transition: all 0.15s ease;
  text-decoration: none; white-space: nowrap;
}
.btn:hover { background: var(--bg-card-hover); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.btn-primary {
  grid-column: 1 / -1;
  background: linear-gradient(45deg, var(--hot), var(--hot-deep));
  border: none; font-weight: 700; font-size: 14px; padding: 14px;
  letter-spacing: 0.04em; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(255,107,107,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 22px rgba(255,107,107,0.42); }
.actions-secondary { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.actions-secondary .btn { flex: 1; min-width: 0; font-size: 12px; padding: 10px 12px; }

/* ───────── secondary actions grid (4-up, wraps on narrow) ───────── */
.actions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
  gap: 8px;
  margin-top: 14px;
}
.action-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  padding: 10px 6px 9px;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 11px;
  color: var(--text);
  font-family: 'Inter',sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: all 0.15s ease;
}
.action-btn svg { width: 18px; height: 18px; color: var(--yolk); }
.action-btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-yolk);
  transform: translateY(-1px);
}
.action-btn:active { transform: translateY(0); }

/* ───────── HOT DOG CTA (primary, bottom of card) ─────────
   Pulsing primary call-to-action. Rotates idle text. On press, cycles through
   escalating challenge phrases by band (1-2 / 3-5 / 6-9 / 10-14 / 15-24 / 25+).
   Visual intensity scales with the band (--hd-scale + box-shadow + animation
   speed + gradient shift). Resets to idle after 5s with no presses. */
.kudos-row {
  margin-top: 14px;
  position: relative;
}
.hd-cta {
  position: relative;
  width: 100%;
  padding: var(--hd-pad-y, 14px) 18px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--hot), var(--hot-deep));
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px;
  box-shadow: 0 6px 22px rgba(255,107,107,0.40);
  font-family: 'Fredoka',sans-serif;
  /* overflow: visible so the button can grow beyond its layout box. */
  overflow: visible;
  --hd-scale: 1;
  --hd-rest: 1;
  --hd-rest-y: 1;          /* extra vertical-only growth multiplied on top */
  transform-origin: center center;
  transform: scale(var(--hd-scale)) scaleY(var(--hd-rest-y, 1));
  transition:
    transform 0.18s cubic-bezier(.34,1.56,.64,1),
    padding  0.20s ease-out,
    background 0.3s;
  animation: hdCtaPulse 1.5s ease-in-out infinite;
  z-index: 1;
}

/* During an active mash session, elevate the button above the vignette
   and bg-egg layer so it's always the focal point of the tunnel. */
body[data-mashing="1"] .kudos-row {
  z-index: 700;
}
@keyframes hdCtaPulse {
  0%, 100% { box-shadow: 0 6px 22px rgba(255,107,107,0.40); }
  50%      { box-shadow: 0 10px 34px rgba(255,107,107,0.70); }
}
.hd-cta:active { --hd-scale: calc(var(--hd-rest, 1) * 0.96); transition-duration: 0.08s; }
/* Lock the button while the save/burn animation is running. Clicks won't
   register, cursor is default, the burst is allowed to complete and reset. */
.hd-cta.is-saving,
.hd-cta.is-burning {
  pointer-events: none;
  cursor: default;
}
.hd-cta-top { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.hd-cta-emoji { font-size: 30px; line-height: 1; }
.hd-cta-count {
  font-size: 26px; font-weight: 700; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.hd-cta-text {
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  text-align: right;
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  opacity: 0.95;
  transition: opacity 0.22s ease;
}
.hd-cta-text.is-fading { opacity: 0; }
.hd-cta-text.is-saving {
  color: var(--yolk-light);
  font-style: italic;
}
/* Animated ellipsis — text becomes "saving" + a 3-step blinking dots */
.hd-cta-text.is-saving::after {
  content: '';
  display: inline-block;
  width: 1.5em;
  text-align: left;
  animation: blinkDots 1.1s steps(4, end) infinite;
}
@keyframes blinkDots {
  0%   { content: '';    }
  25%  { content: '.';   }
  50%  { content: '..';  }
  75%  { content: '...'; }
  100% { content: '';    }
}

/* +N COUNTER + CHALLENGE TEXT — both live OUTSIDE the button now (as
   siblings inside .kudos-row) so the button's scale transform doesn't
   carry them along. They stay anchored to the row's layout box (which
   stays inside the event card). The button can grow wildly via scale
   and the text stays put inside the card. */
.kudos-row {
  position: relative;
  /* No padding reserve needed — mash-sub is now inside the centered overlay,
     not anchored to the bottom of the row. */
}

.hd-cta-mash {
  position: absolute;
  left: 50%;
  /* Default (saving / burning / idle): center in the row */
  top: 50%;
  transform: translate(-50%, -50%) scale(var(--mash-scale, 1));
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s, transform 0.25s cubic-bezier(.34,1.56,.64,1);
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  max-width: 95%;
  width: max-content;
  text-align: center;
}

/* During active mashing, anchor the overlay to the BOTTOM of the card
   so it grows UPWARD. The challenge phrase pins at the bottom, +N floats
   above it — no matter how big +N gets, nothing clips at the card edge. */
.hd-cta.is-mashing ~ .hd-cta-mash {
  top: auto;
  bottom: 6px;
  transform: translateX(-50%) scale(var(--mash-scale, 1));
  justify-content: flex-end;
}
/* sibling selector: state classes live on the button, overlays sit after it */
.hd-cta.is-mashing ~ .hd-cta-mash,
.hd-cta.is-saving  ~ .hd-cta-mash,
.hd-cta.is-burning ~ .hd-cta-mash { opacity: 1; }

.mash-num {
  font-family: 'Fredoka',sans-serif;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  font-size: 30px;
  line-height: 1;
  color: #fff;
  text-shadow: 0 3px 12px rgba(0,0,0,0.85), 0 0 24px rgba(255,255,255,0.45);
  transition: font-size 0.22s ease;
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* CHALLENGE PHRASE — second line inside the centered overlay, directly below
   the +N counter. Font size is set dynamically from JS (setSub()) so even
   the longest phrase always fits on ONE line — never wraps, never ellipsis.
   Flex child of .hd-cta-mash. */
.mash-sub {
  font-family: 'Fredoka',sans-serif;
  font-weight: 700;
  font-style: italic;
  font-size: 24px;             /* JS overrides this; just a sane default */
  line-height: 1.1;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--yolk-light);
  text-shadow:
    0 0 12px rgba(255,199,44,0.55),
    0 0 24px rgba(255,107,107,0.4),
    0 2px 8px rgba(0,0,0,0.8);
  opacity: 0;
  transition: opacity 0.22s;
  pointer-events: none;
  white-space: nowrap;          /* single line always */
  text-align: center;
}

/* Phase: idle (no presses yet, or post-burn reset) — big "MASH ME" centered
   like an emergency-stop button label. Top-left 🌭 + running total stays
   VISIBLE so visitors immediately read this as "the hot dog counter."
   Right-side text is hidden; the centered overlay does the call to action. */
.hd-cta.is-idle .hd-cta-text { opacity: 0; transition: opacity 0.25s; }
.hd-cta.is-idle ~ .hd-cta-mash { opacity: 1; }
.hd-cta.is-idle ~ .hd-cta-mash .mash-num {
  font-size: clamp(20px, 6.5vw, 30px) !important;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #fff;
  text-shadow:
    0 0 10px rgba(255,255,255,0.7),
    0 0 22px rgba(255,199,44,0.65),
    0 0 38px rgba(255,107,107,0.55),
    0 4px 14px rgba(0,0,0,0.55);
  animation: idleEmergencyPulse 1.5s ease-in-out infinite;
}
@media (max-width: 380px) {
  .hd-cta.is-idle ~ .hd-cta-mash .mash-num {
    letter-spacing: 0.14em;
  }
  .hd-cta.is-idle .hd-cta-emoji { font-size: 22px; }
  .hd-cta.is-idle .hd-cta-count { font-size: 18px; }
}
.hd-cta.is-idle ~ .hd-cta-mash .mash-sub { opacity: 0; }
@keyframes idleEmergencyPulse {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 8px rgba(255,255,255,0.55),
      0 0 18px rgba(255,199,44,0.55),
      0 0 30px rgba(255,107,107,0.45),
      0 4px 14px rgba(0,0,0,0.55);
  }
  50% {
    transform: scale(1.06);
    text-shadow:
      0 0 18px rgba(255,255,255,0.95),
      0 0 36px rgba(255,199,44,0.9),
      0 0 60px rgba(255,107,107,0.7),
      0 0 90px rgba(255,255,200,0.4),
      0 4px 18px rgba(0,0,0,0.55);
  }
}

/* Mashing — from press 1, the in-button text (top-left 🌭+count and
   right-side challenge) is HIDDEN. They live inside the scaling button
   and would visually shift on every press, so we drop them entirely
   the moment a burst starts. The +N counter (mash-num) and the
   challenge phrase (mash-sub) are siblings of the button anchored to
   the row — they stay rock solid no matter how big the button grows. */
.hd-cta.is-mashing .hd-cta-top,
.hd-cta.is-mashing .hd-cta-text {
  opacity: 0;
  transition: opacity 0.2s;
}
.hd-cta.is-mashing ~ .hd-cta-mash .mash-sub { opacity: 1; }
/* deep-mashing class is kept on the button for visual band changes
   (intensity 0-5 styling) but no longer toggles layout. */

/* Phase: saving — "saving N" in the centered overlay with blinking dots */
.hd-cta.is-saving .hd-cta-top,
.hd-cta.is-saving .hd-cta-text { opacity: 0; transition: opacity 0.25s; }
.hd-cta.is-saving ~ .hd-cta-mash .mash-num {
  color: var(--yolk-light);
  font-style: italic;
  letter-spacing: 0.02em;
}
.hd-cta.is-saving ~ .hd-cta-mash .mash-num::after {
  content: '';
  display: inline-block;
  width: 1.4em;
  text-align: left;
  animation: blinkDots 1.1s steps(4, end) infinite;
}
.hd-cta.is-saving ~ .hd-cta-mash .mash-sub { opacity: 0; }

/* Phase: burn — 4-second flash with a "you must be scrambled" taunt that
   pulses repeatedly. Big, glowing, hard to ignore — the goal is to make
   the user feel called out and want to come back swinging. */
.hd-cta.is-burning .hd-cta-top,
.hd-cta.is-burning .hd-cta-text { opacity: 0; transition: opacity 0.25s; }
.hd-cta.is-burning ~ .hd-cta-mash {
  white-space: normal;
}
.hd-cta.is-burning ~ .hd-cta-mash .mash-num {
  font-size: clamp(22px, 6.5vw, 34px) !important;
  font-style: italic;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: normal;
  text-align: center;
  line-height: 1.15;
  text-shadow:
    0 0 14px rgba(255,255,255,0.7),
    0 0 28px rgba(255,199,44,0.6),
    0 0 48px rgba(255,107,107,0.55),
    0 4px 16px rgba(0,0,0,0.7);
  animation: burnFlash 4s cubic-bezier(.34,1.56,.64,1) forwards;
}
.hd-cta.is-burning ~ .hd-cta-mash .mash-sub { opacity: 0; }
@keyframes burnFlash {
  /* Pop in */
  0%   { opacity: 0; transform: scale(0.65); }
  6%   { opacity: 1; transform: scale(1.18); }
  12%  { opacity: 1; transform: scale(1.00); }
  /* Pulse 1 */
  22%  { transform: scale(1.10); }
  30%  { transform: scale(1.00); }
  /* Pulse 2 */
  42%  { transform: scale(1.10); }
  50%  { transform: scale(1.00); }
  /* Pulse 3 */
  62%  { transform: scale(1.08); }
  70%  { transform: scale(1.00); }
  /* Pulse 4 */
  80%  { transform: scale(1.06); }
  88%  { opacity: 1; transform: scale(1.00); }
  /* Fade out */
  100% { opacity: 0; transform: scale(0.95); }
}

/* COLOR CYCLE — gradient driven by --hd-hue (JS sets it per press, cycles
   through the full spectrum every ~26 presses). Bands no longer override
   `background` so the hue cycle dominates. */
.hd-cta {
  background: linear-gradient(135deg,
    hsl(var(--hd-hue, 0), 85%, 60%),
    hsl(calc(var(--hd-hue, 0) + 35), 90%, 50%));
}

/* Visual band shadow + animation only — color comes from --hd-hue above */
.hd-cta[data-intensity="0"] { box-shadow: 0 6px 22px rgba(255,107,107,0.40); }
.hd-cta[data-intensity="1"] { box-shadow: 0 8px 28px rgba(255,107,107,0.55);  animation-duration: 1.3s; }
.hd-cta[data-intensity="2"] { box-shadow: 0 10px 36px rgba(255,107,107,0.65); animation-duration: 1.1s; }
.hd-cta[data-intensity="3"] { box-shadow: 0 14px 48px rgba(255,107,107,0.78); animation: hdCtaThrob 0.85s ease-in-out infinite; }
.hd-cta[data-intensity="4"] { box-shadow: 0 20px 70px rgba(255,255,255,0.65); animation: hdCtaThrob 0.65s ease-in-out infinite; }
.hd-cta[data-intensity="5"] { box-shadow: 0 24px 90px rgba(255,255,200,0.85), 0 0 60px rgba(255,255,255,0.5); animation: hdCtaThrob 0.45s ease-in-out infinite; }
.hd-cta[data-intensity="6"] { box-shadow: 0 30px 120px rgba(255,255,255,1), 0 0 100px rgba(255,255,200,0.95); animation: hdCtaThrob 0.30s ease-in-out infinite; }
.hd-cta:not(:active) { --hd-scale: var(--hd-rest, 1); }

/* Throb — a more aggressive pulse that adds filter brightness/saturation
   on top of the box-shadow swell. Replaces the milder hdCtaPulse at higher
   bands. */
@keyframes hdCtaThrob {
  0%, 100% { filter: brightness(1) saturate(1); }
  50%      { filter: brightness(1.30) saturate(1.45); }
}

.hd-cta .ping {
  position: absolute; inset: 0; border-radius: 16px;
  background: rgba(255,255,255,0.22);
  animation: hdPing 0.45s ease-out forwards;
  pointer-events: none;
}
@keyframes hdPing {
  0%   { opacity: 0.7; }
  100% { opacity: 0; transform: scale(1.04); }
}

/* ───────── weather panel (prominent, real Open-Meteo data) ───────── */
.weather-panel {
  display: flex; align-items: center; gap: 14px;
  margin-top: 14px; padding: 12px 14px;
  background: linear-gradient(135deg, rgba(135,206,250,0.08), rgba(255,199,44,0.04));
  border: 1px solid rgba(135,206,250,0.22);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
.weather-panel.is-loading::after {
  content: '';
  position: absolute; left: -50%; top: 0;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  animation: shimmer 1.5s linear infinite;
}
@keyframes shimmer {
  0%   { transform: translateX(0); }
  100% { transform: translateX(400%); }
}
.weather-icon-big { font-size: 34px; line-height: 1; flex-shrink: 0; }
.weather-temp-big {
  font-family: 'Fredoka',sans-serif;
  font-size: 26px; font-weight: 700; line-height: 1;
  background: linear-gradient(45deg, #87CEFA, var(--yolk-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-variant-numeric: tabular-nums;
}
.weather-details {
  display: flex; flex-direction: column; gap: 3px;
  flex: 1; min-width: 0;
}
.weather-desc {
  font-family: 'Fredoka',sans-serif;
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.weather-extra {
  font-size: 11px; color: var(--text-mute);
  display: flex; gap: 10px; flex-wrap: wrap;
}
.weather-extra .warn { color: var(--amber); font-weight: 600; }
.weather-source {
  position: absolute; bottom: 4px; right: 8px;
  font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-dim); opacity: 0.6;
}

/* ───────── ride leader (overlay, half-on-banner half-on-body) ───────── */
.rl-overlay {
  position: absolute;
  right: 16px;
  /* Banner is 200px tall; avatar is 76px; overlap ~46px banner + 30px body */
  top: 154px;
  z-index: 30;          /* must outrank Leaflet panes (max 700) — established stacking context on .featured-map keeps that confined, but keep this high anyway */
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
}
.rl-avatar {
  position: relative;
  width: 76px; height: 76px;
  pointer-events: auto;
}
.rl-photo {
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 3px solid var(--bg-deep);
  box-shadow: 0 6px 18px rgba(0,0,0,0.55), 0 0 0 2px var(--yolk);
  object-fit: cover;
  background: linear-gradient(135deg, #555, #333);
  display: block;
}
/* The orbit container rotates around the avatar's center, sweeping the crown
   along the top arc of the circle from upper-left to upper-right. */
.rl-crown-orbit {
  position: absolute;
  inset: 0;
  pointer-events: none;
  animation: rlCrownOrbit 5.5s ease-in-out infinite;
  transform-origin: 50% 50%;
}
@keyframes rlCrownOrbit {
  0%, 100% { transform: rotate(-30deg); }
  50%      { transform: rotate(30deg); }
}
.rl-crown {
  /* User-tuned: top:-31px sits the crown perfectly on the rotating gold
     ring at the default 76px avatar size. The orbit container rotates
     around (38, 38), so the crown traces an arc of radius
     ~38 + |top + crown_height/2 - 38| ≈ 45px — just outside the gold
     border (40px radius). Mobile (<380px breakpoint below) shrinks the
     avatar to 68px so we proportionally adjust top + size to keep the
     same visual placement. */
  position: absolute;
  top: -31px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  animation: rlCrownShimmer 1.8s ease-in-out infinite;
}
@keyframes rlCrownShimmer {
  0%, 100% {
    filter: drop-shadow(0 0 3px rgba(255,215,0,0.35))
            drop-shadow(0 2px 3px rgba(0,0,0,0.6))
            brightness(1) saturate(1);
  }
  50% {
    filter: drop-shadow(0 0 14px rgba(255,215,0,0.95))
            drop-shadow(0 0 5px rgba(255,255,200,0.65))
            drop-shadow(0 2px 3px rgba(0,0,0,0.6))
            brightness(1.35) saturate(1.4);
  }
}
.rl-meta {
  margin-top: 6px;
  text-align: center;
  pointer-events: none;
  max-width: 96px;
  width: 96px;
}
.rl-meta .rl-label {
  display: block;
  font-family: 'Montserrat',sans-serif;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--yolk);
  text-shadow: 0 1px 4px rgba(0,0,0,0.85), 0 0 8px rgba(0,0,0,0.8);
}
.rl-meta .rl-name {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;        /* allow long names to wrap to 2 lines on mobile */
  font-family: 'Fredoka',sans-serif;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.2;
  color: var(--text);
  text-shadow: 0 1px 6px rgba(0,0,0,0.95), 0 0 10px rgba(0,0,0,0.85);
  margin-top: 1px;
  overflow: hidden;
  word-break: break-word;
}
@media (max-width: 380px) {
  .rl-overlay { right: 12px; top: 158px; }
  .rl-avatar  { width: 68px; height: 68px; }
  /* Crown scales with the avatar: 68/76 ≈ 0.89 ratio.
     top: -31 * 0.89 ≈ -28; font-size: 24 * 0.89 ≈ 22 */
  .rl-crown   { top: -28px; font-size: 22px; }
  .rl-meta    { max-width: 88px; width: 88px; }
  .rl-meta .rl-name { font-size: 12px; }
  .featured-body.has-rl .event-name,
  .featured-body.has-rl .event-meta { padding-right: 84px; }
}
/* Reserve space on the right when a ride leader is present so text doesn't
   collide with the avatar in the upper portion of the body. */
.featured-body.has-rl .event-name,
.featured-body.has-rl .event-meta { padding-right: 92px; }

/* ───────── banner override ───────── */
.featured-banner {
  position: relative;
  height: 200px;
  background-size: cover;
  background-position: center;
  background-color: var(--bg-deep);
}
.featured-banner::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(0,0,0,0.20) 0%, transparent 50%, rgba(26,26,26,0.85) 100%);
  pointer-events: none;
}

/* ───────── coming up list ───────── */
.coming-list { display: flex; flex-direction: column; gap: 8px; }
.coming-card {
  display: flex; align-items: stretch; gap: 14px;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  position: relative; opacity: 0.92;
}
.coming-card .date-stamp {
  flex-shrink: 0; width: 54px; text-align: center;
  padding: 6px 0; border-right: 1px solid var(--border-soft);
}
.coming-card .date-stamp .month {
  font-family: 'Montserrat',sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--yolk);
}
.coming-card .date-stamp .day {
  font-family: 'Fredoka',sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--text); line-height: 1; margin: 2px 0 1px;
}
.coming-card .date-stamp .weekday { font-size: 10px; color: var(--text-mute); font-weight: 500; }
.coming-card .info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
.coming-card .info .name {
  font-family: 'Fredoka',sans-serif;
  font-size: 15px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.coming-card .info .meta {
  font-size: 12px; color: var(--text-mute); margin-top: 3px;
  display: flex; gap: 10px; flex-wrap: wrap;
}
.coming-card .lock {
  position: absolute; top: 10px; right: 10px;
  width: 14px; height: 14px; color: var(--text-dim);
}

/* Unlocked variant — admin has opened this future event for visitors */
.coming-card.is-unlocked {
  background: linear-gradient(90deg, rgba(255,199,44,0.06), rgba(255,107,107,0.03));
  border-color: var(--border-yolk);
  opacity: 1;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
}
.coming-card.is-unlocked:hover {
  transform: translateY(-1px);
  background: linear-gradient(90deg, rgba(255,199,44,0.10), rgba(255,107,107,0.05));
  border-color: rgba(255,199,44,0.45);
}
.coming-card.is-unlocked .unlock-icon {
  position: absolute; top: 10px; right: 10px;
  width: 14px; height: 14px;
  font-size: 14px;
  line-height: 14px;
  text-align: center;
  filter: drop-shadow(0 0 6px rgba(255,199,44,0.6));
}

/* ───────── locked toast (transient bottom snackbar) ───────── */
.lock-toast {
  position: fixed;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%) translateY(20px);
  background: rgba(20,20,20,0.95);
  border: 1px solid var(--border-yolk);
  color: var(--text);
  font-family: 'Inter',sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 11px 18px;
  border-radius: 999px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  z-index: 3000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.25s cubic-bezier(.22,.61,.36,1);
  display: inline-flex; align-items: center; gap: 8px;
  max-width: calc(100vw - 32px);
  white-space: nowrap;
}
.lock-toast.is-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.lock-toast svg { width: 14px; height: 14px; color: var(--yolk); flex-shrink: 0; }

/* ───────── event detail sheet (full-ish bottom sheet; modeled on cal-sheet) ───────── */
.evt-sheet {
  position: fixed; inset: 0;
  z-index: 2100;
  display: flex; align-items: flex-end; justify-content: center;
  pointer-events: none;
}
.evt-sheet[hidden] { display: none; }
.evt-sheet-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  pointer-events: auto;
  animation: fadeIn 0.2s ease;
}
.evt-sheet-body {
  position: relative;
  width: 100%; max-width: 560px;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: linear-gradient(160deg, #232325, #1a1a1a);
  border: 1px solid var(--border-yolk);
  border-radius: 20px 20px 0 0;
  padding: 0 0 22px;
  pointer-events: auto;
  animation: sheetSlide 0.28s cubic-bezier(.22,.61,.36,1);
  box-shadow: 0 -10px 50px rgba(0,0,0,0.55);
}
.evt-sheet-close {
  position: absolute; top: 10px; right: 10px;
  z-index: 40;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  border: 1px solid var(--border-soft);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  backdrop-filter: blur(6px);
}
.evt-sheet-close:hover { background: rgba(0,0,0,0.75); border-color: var(--border-yolk); }
.evt-sheet-handle {
  width: 40px; height: 4px;
  margin: 8px auto 0;
  background: var(--border-soft);
  border-radius: 2px;
}
/* The sheet's inner card reuses .featured visual language but flat (no border/shadow) */
.evt-sheet .featured {
  border: none;
  border-radius: 0;
  box-shadow: none;
  background: transparent;
}
.evt-weather-fallback {
  margin-top: 14px;
  padding: 10px 12px;
  border: 1px dashed var(--border-soft);
  border-radius: 10px;
  font-size: 11px;
  color: var(--text-mute);
  text-align: center;
  letter-spacing: 0.04em;
}

.show-more {
  margin-top: 12px; width: 100%;
  background: transparent; color: var(--text-mute);
  border: 1px dashed var(--border-soft);
  padding: 12px; border-radius: 12px;
  font-family: 'Inter',sans-serif;
  font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.show-more:hover { color: var(--yolk); border-color: var(--border-yolk); }

/* ───────── archive ───────── */
.archive-toggle {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; margin-top: 24px;
  padding: 14px 16px;
  background: transparent; color: var(--text-mute);
  border: 1px solid var(--border-soft); border-radius: 14px;
  font-family: 'Montserrat',sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.archive-toggle:hover { color: var(--text); border-color: var(--border-yolk); }
.archive-toggle .chev { transition: transform 0.2s; }
.archive-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
.archive-body { margin-top: 8px; display: none; }
.archive-body.is-open { display: block; }

.archive-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border-soft);
  font-size: 13px;
}
.archive-card:first-child { border-top-left-radius: 12px; border-top-right-radius: 12px; }
.archive-card:last-child  { border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
.archive-card .arch-date {
  font-family: 'Montserrat',sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-dim); width: 70px; flex-shrink: 0;
}
.archive-card .arch-name {
  flex: 1; color: var(--text); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.archive-card .arch-kudos { font-size: 12px; color: var(--hot); font-weight: 600; flex-shrink: 0; }

/* ───────── empty state ───────── */
.empty {
  text-align: center; padding: 38px 20px;
  border: 1px dashed var(--border-soft); border-radius: 16px;
  background: rgba(255,255,255,0.02);
}
.empty .em { font-size: 36px; margin-bottom: 8px; filter: grayscale(0.3); opacity: 0.7; }
.empty .head {
  font-family: 'Fredoka',sans-serif;
  font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px;
}
.empty .sub { font-size: 13px; color: var(--text-mute); line-height: 1.5; }

/* ───────── flying hot dogs ───────── */
.flying-hot-dog {
  position: fixed; pointer-events: none; z-index: 1000;
  font-size: 36px; will-change: transform, opacity;
}
/* When the event sheet is open (z-index 2100), bump ALL mash-mode fixed
   effects above it so they paint on the sheet, not behind it. */
body[data-sheet-open="1"] .flying-hot-dog,
body[data-sheet-open="1"] .flying-egg,
body[data-sheet-open="1"] .phrase-char     { z-index: 9000; }
body[data-sheet-open="1"] .mash-vignette   { z-index: 2200; }
body[data-sheet-open="1"] .mash-flash      { z-index: 2150; }
/* Shift the vignette clear-center lower — button is near the bottom of the
   bottom sheet (≈88% from viewport top), not the page center (75%). */
body[data-sheet-open="1"] .mash-vignette {
  background: radial-gradient(
    ellipse 58% 40% at 50% 88%,
    transparent 16%,
    rgba(0,0,0,0.70) 48%,
    rgba(0,0,0,1) 92%
  );
}
/* Ambient eggs also pop above the sheet when rainbow mode kicks in */
body[data-sheet-open="1"][data-eggs-rainbow="1"] .egg { z-index: 2300; }
/* Rainbow halo treatment — applied to a fraction of dogs at press 25+,
   100% of dogs at press 100+. Cycles colored drop-shadows at high speed. */
.flying-hot-dog.is-rainbow,
.flying-egg.is-rainbow {
  animation: rainbowHalo 0.7s linear infinite;
}
@keyframes rainbowHalo {
  0%   { filter: drop-shadow(0 0 10px hsl(  0,100%,60%)) drop-shadow(0 0 22px hsl( 40,100%,60%)) brightness(1.3) saturate(1.5); }
  17%  { filter: drop-shadow(0 0 10px hsl( 60,100%,60%)) drop-shadow(0 0 22px hsl(100,100%,60%)) brightness(1.3) saturate(1.5); }
  33%  { filter: drop-shadow(0 0 10px hsl(120,100%,60%)) drop-shadow(0 0 22px hsl(160,100%,60%)) brightness(1.3) saturate(1.5); }
  50%  { filter: drop-shadow(0 0 10px hsl(180,100%,60%)) drop-shadow(0 0 22px hsl(220,100%,60%)) brightness(1.3) saturate(1.5); }
  67%  { filter: drop-shadow(0 0 10px hsl(240,100%,60%)) drop-shadow(0 0 22px hsl(280,100%,60%)) brightness(1.3) saturate(1.5); }
  83%  { filter: drop-shadow(0 0 10px hsl(300,100%,60%)) drop-shadow(0 0 22px hsl(340,100%,60%)) brightness(1.3) saturate(1.5); }
  100% { filter: drop-shadow(0 0 10px hsl(360,100%,60%)) drop-shadow(0 0 22px hsl(400,100%,60%)) brightness(1.3) saturate(1.5); }
}

/* Rainbow eggs — same emit pattern as hot dogs but spawn at random
   chance once press count crosses 25. */
.flying-egg {
  position: fixed; pointer-events: none; z-index: 1000;
  font-size: 28px; will-change: transform, opacity;
}

/* When mash overdrive kicks in (press 50+) the ambient floating background
   eggs pop ABOVE the vignette, light up, and pulse rainbow. */
body[data-eggs-rainbow="1"] .egg {
  z-index: 550;            /* above vignette (500), below the button (700) */
  opacity: 0.9;
  animation:
    floatEgg var(--dur,22s) ease-in-out infinite,
    eggBgRainbow 1.4s linear infinite;
}
@keyframes eggBgRainbow {
  0%   { filter: drop-shadow(0 0 12px hsl(  0,100%,60%)) brightness(1.5) saturate(1.6); }
  17%  { filter: drop-shadow(0 0 12px hsl( 60,100%,60%)) brightness(1.5) saturate(1.6); }
  33%  { filter: drop-shadow(0 0 12px hsl(120,100%,60%)) brightness(1.5) saturate(1.6); }
  50%  { filter: drop-shadow(0 0 12px hsl(180,100%,60%)) brightness(1.5) saturate(1.6); }
  67%  { filter: drop-shadow(0 0 12px hsl(240,100%,60%)) brightness(1.5) saturate(1.6); }
  83%  { filter: drop-shadow(0 0 12px hsl(300,100%,60%)) brightness(1.5) saturate(1.6); }
  100% { filter: drop-shadow(0 0 12px hsl(360,100%,60%)) brightness(1.5) saturate(1.6); }
}

/* Mash flash — full-screen color burst painted BEHIND the vignette so
   it bleeds through the clear center where the button lives. Only fires
   at press 100+. */
.mash-flash {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 490;
  opacity: 0;
}

/* ───────── mash vignette + ambient effects ─────────
   When the user starts mashing, the page progressively darkens around
   the button — full tunnel-vision by ~50 presses. Driven by the
   --mash-energy CSS variable on <body>, set from JS each press
   (clamped 0 → 1 over presses 1–50, fades back to 0 on save). */
.mash-vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 500;
  opacity: var(--mash-energy, 0);
  /* Doubled — tighter clear center, harder fall, fully black edges. */
  background: radial-gradient(
    ellipse 58% 42% at 50% 75%,
    transparent 16%,
    rgba(0,0,0,0.7) 48%,
    rgba(0,0,0,1) 92%
  );
  transition: opacity 0.45s ease;
}

/* ───────── shockwave dislodging ─────────
   On every click we re-roll random per-element CSS vars (--jx, --jy, --jr,
   --jls). Each element multiplies its own randomness by the global mash
   energy + overdrive so displacement starts subtle and grows into chaos.
   By press 100 (overdrive = 1), the page looks structurally broken. */
.page-header h1, .page-header p,
.section-label,
.event-name, .event-meta, .event-meta span,
.event-desc, .tags, .tags .tag,
.coming-card .name, .coming-card .meta,
.coming-card .date-stamp .day,
.coming-card .date-stamp .month,
.coming-card .date-stamp .weekday,
.archive-toggle,
.archive-card .arch-name,
.archive-card .arch-date,
.archive-card .arch-kudos,
.weather-desc, .weather-extra, .countdown-display, .countdown-label {
  transition: transform 0.20s cubic-bezier(.34,1.56,.64,1);
  /* Transform-only shockwave — translate + rotate are GPU-composited and
     do NOT trigger layout reflow. letter-spacing was removed because it
     causes text to reflow (paragraph changes height), which physically
     pushes the kudos row around in the document flow. */
  transform:
    translateX(calc(var(--jx, 0) * (var(--mash-energy, 0) * 14px + var(--mash-overdrive, 0) * 24px)))
    translateY(calc(var(--jy, 0) * (var(--mash-energy, 0) *  9px + var(--mash-overdrive, 0) * 18px)))
    rotate(calc(var(--jr, 0) * (var(--mash-energy, 0) * 3deg + var(--mash-overdrive, 0) * 5deg)));
}

/* Coming-up cards as a whole shudder slightly too */
.coming-card {
  --jx: 0; --jy: 0; --jr: 0;
  transition: transform 0.20s cubic-bezier(.34,1.56,.64,1);
  transform:
    translateX(calc(var(--jx, 0) * (var(--mash-energy, 0) * 6px + var(--mash-overdrive, 0) * 12px)))
    translateY(calc(var(--jy, 0) * (var(--mash-energy, 0) * 3px + var(--mash-overdrive, 0) * 8px)))
    rotate(calc(var(--jr, 0) * (var(--mash-energy, 0) * 1deg + var(--mash-overdrive, 0) * 2deg)));
}

/* Hard exemption — the kudos row and everything in it MUST NOT shift,
   wobble, or animate position with the shockwave. The +N counter and
   challenge text need to stay readable while the rest of the page warps.
   This zeroes out any inherited shockwave variables and overrides any
   transform that might otherwise cascade in. */
.kudos-row,
.kudos-row *,
.hd-cta-mash, .hd-cta-mash *,
.mash-sub {
  --jx: 0 !important;
  --jy: 0 !important;
  --jr: 0 !important;
  --jls: 0 !important;
}

/* Page header pulses + bounces with mash energy. At energy 0 the keyframes
   evaluate to no movement (translate 0, scale 1). At full energy the
   header bobs ~3px and pulses ~4% larger. */
.page-header {
  animation: pageHeaderMashBounce 0.55s ease-in-out infinite;
  transform-origin: 50% 50%;
}
@keyframes pageHeaderMashBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% {
    transform:
      translateY(calc(var(--mash-energy, 0) * -3px))
      scale(calc(1 + var(--mash-energy, 0) * 0.04));
  }
}

/* Section labels do a softer parallel pulse for cohesion. */
.section-label {
  transition: opacity 0.4s ease;
  opacity: calc(1 - var(--mash-energy, 0) * 0.85);
}

/* ───────── floating phrase ───────── */
.phrase-char {
  position: fixed; pointer-events: none; z-index: 1001;

<script>
/* ════════════════════════════════════════════════════════════════
   SCRAMBLED LEGS · CALENDAR WIDGET MOCKUP
   Single-variant prototype based on the Card Stack direction.
   Lifecycle: upcoming → in_progress (at start) → beers (start+2h) → archived (next day midnight local)
   ════════════════════════════════════════════════════════════════ */

const LIFECYCLE = { BEERS_AFTER_MS: 2 * 60 * 60 * 1000 };

/* ─── Timezone-anchored lifecycle ─────────────────────────────────────
   The team is in Duluth (Central Time). We anchor "this event's day"
   and "the day after" to America/Chicago specifically — NOT the visitor's
   device timezone. So a viewer in NYC at 1am ET (= midnight CT) still
   sees the event as "in progress / beers"; the rollover happens when
   it's actually midnight in Duluth.
   Handles CDT/CST DST automatically via Intl. */
const TIMEZONE = 'America/Chicago';

function tzOffsetMs(timestamp, tz) {
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hourCycle: 'h23',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
  const parts = fmt.formatToParts(new Date(timestamp));
  const get = (t) => parseInt(parts.find(p => p.type === t).value, 10);
  const fakeUtc = Date.UTC(get('year'), get('month') - 1, get('day'),
                            get('hour'), get('minute'), get('second'));
  return fakeUtc - timestamp;  // offset of `tz` from UTC at that moment
}

function ctMidnightOf(year, month, day) {
  // Compute the unix ms for "00:00:00 in America/Chicago on year-month-day"
  const guessUtc = Date.UTC(year, month - 1, day, 12, 0, 0);  // noon UTC, safely in the same calendar day in CT
  const offset = tzOffsetMs(guessUtc, TIMEZONE);
  return Date.UTC(year, month - 1, day, 0, 0, 0) - offset;
}

function nextCtMidnightAfter(eventStart) {
  const dateStr = new Intl.DateTimeFormat('en-CA', {
    timeZone: TIMEZONE, year: 'numeric', month: '2-digit', day: '2-digit'
  }).format(new Date(eventStart));
  const [y, m, d] = dateStr.split('-').map(Number);
  return ctMidnightOf(y, m, d + 1);  // Date.UTC handles month/day overflow
}

*/

const PAST_SEED = [
  { id: 'past1',  name: "Lester Park Opener",      finalKudos: 92,  dayOffset: -7 },
  { id: 'past2',  name: "Hartley Mud Fest",        finalKudos: 48,  dayOffset: -14 },
  { id: 'past3',  name: "Piedmont Sufferfest",     finalKudos: 67,  dayOffset: -21 },
  { id: 'past4',  name: "Season Kickoff",          finalKudos: 113, dayOffset: -28 },
  { id: 'past5',  name: "Spring Cleanup Crew",     finalKudos: 41,  dayOffset: -35 },
  { id: 'past6',  name: "Mission Creek Slogfest",  finalKudos: 28,  dayOffset: -42 },
  { id: 'past7',  name: "COGGS Volunteer Day",     finalKudos: 55,  dayOffset: -49 },
  { id: 'past8',  name: "Hartley Halloween Ride",  finalKudos: 88,  dayOffset: -56 },
  { id: 'past9',  name: "Fond du Lac Frostbite",   finalKudos: 22,  dayOffset: -63 },
  { id: 'past10', name: "Lester Park Last Light",  finalKudos: 76,  dayOffset: -70 },
  { id: 'past11', name: "Spirit Mountain Skills",  finalKudos: 33,  dayOffset: -77 },
  { id: 'past12', name: "Pre-Season Group Spin",   finalKudos: 19,  dayOffset: -84 },

let currentMode = 'live';
let events = [];
let pastEvents = [];

function buildEvents(mode) {
  events = EVENT_SEED.map((e, i) => ({ ...e, start: nextWednesday(i) }));
  if (mode === 'soon')           events[0].start = Date.now() + 10_000;
  else if (mode === 'in_progress') events[0].start = Date.now() - 30 * 60 * 1000;
  else if (mode === 'beers')       events[0].start = Date.now() - 3 * 60 * 60 * 1000;
  else if (mode === 'far')         events[0].start = Date.now() + 12 * 86400000;
  else if (mode === 'empty')       events = [];

  pastEvents = PAST_SEED.map(p => ({ ...p, start: Date.now() + p.dayOffset * 86400000 }));
}

function getStatus(ev) {
  const now = Date.now();
  if (now < ev.start) return 'upcoming';
  if (now < ev.start + LIFECYCLE.BEERS_AFTER_MS) return 'in_progress';
  // Archive when CENTRAL TIME midnight passes after the event's CT day —
  // not the viewer's local midnight, not UTC midnight. Stays in "beers"
  // for everyone until the team's home timezone flips the day.
  if (now < nextCtMidnightAfter(ev.start)) return 'beers';
  return 'archived';
}

const STATUS_LABEL = { upcoming: 'UPCOMING', in_progress: 'IN PROGRESS', beers: 'BEERS BEING CONSUMED' };

function fmtCountdown(ms) {
  if (ms <= 0) return null;
  const totalSec = Math.floor(ms/1000);
  const d = Math.floor(totalSec/86400);
  const h = Math.floor((totalSec%86400)/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  const pad = (n) => String(n).padStart(2,'0');
  if (d > 0) return `${d}d <span class="sep">·</span> ${pad(h)}h <span class="sep">·</span> ${pad(m)}m <span class="sep">·</span> ${pad(s)}s`;
  if (h > 0) return `${pad(h)}h <span class="sep">·</span> ${pad(m)}m <span class="sep">·</span> ${pad(s)}s`;
  return `${pad(m)}m <span class="sep">·</span> ${pad(s)}s`;
}

function fmtTimeSince(ms) {
  const totalMin = Math.floor(ms/60000);
  const h = Math.floor(totalMin/60);
  const m = totalMin%60;
  // Spell out "min" (instead of "m") so it can't be mis-read as miles.
  if (h > 0) return `${h}h ${m} min in`;
  return `${m} min in`;
}

const fmtDateLong = (ts) => new Intl.DateTimeFormat(undefined, { weekday:'short', month:'short', day:'numeric' }).format(new Date(ts));
const fmtTime     = (ts) => new Intl.DateTimeFormat(undefined, { hour:'numeric', minute:'2-digit' }).format(new Date(ts));
const fmtDayNum   = (ts) => new Date(ts).getDate();
const fmtMonth    = (ts) => new Intl.DateTimeFormat(undefined, { month:'short' }).format(new Date(ts)).toUpperCase();
const fmtWeekday  = (ts) => new Intl.DateTimeFormat(undefined, { weekday:'short' }).format(new Date(ts));
const fmtCount    = (n) => new Intl.NumberFormat().format(n);  // "1,247" etc.

/* Weather is only meaningfully available within 10 days. Used to gate
   render of the .weather-panel block on both featured + unlocked sheets. */
const WEATHER_HORIZON_DAYS = 10;
function weatherInRange(eventStartMs) {
  return (eventStartMs - Date.now()) / 86400000 <= WEATHER_HORIZON_DAYS;
}

function directionsUrl(ev) {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const sameLoc = ev.startLoc.lat === ev.endLoc.lat && ev.startLoc.lng === ev.endLoc.lng;
  if (isIOS) return `https://maps.apple.com/?daddr=${ev.startLoc.lat},${ev.startLoc.lng}`;
  if (sameLoc) return `https://www.google.com/maps/dir/?api=1&destination=${ev.startLoc.lat},${ev.startLoc.lng}`;
  return `https://www.google.com/maps/dir/?api=1&origin=${ev.startLoc.lat},${ev.startLoc.lng}&destination=${ev.endLoc.lat},${ev.endLoc.lng}`;
}

/* Build Google Calendar deep link — opens calendar.google.com with event pre-
   filled. One click, no download. Best UX for users with a Google account. */
function googleCalUrl(ev) {
  const fmt = (ts) => new Date(ts).toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const params = new URLSearchParams({
    action:   'TEMPLATE',
    text:     ev.name,
    dates:    `${fmt(ev.start)}/${fmt(ev.start + 2*60*60*1000)}`,
    details:  `${ev.description}\n\nhttps://thescrambledlegs.com/events/${ev.id}`,
    location: ev.startLoc.label,
  });
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

/* Build Outlook (Outlook.com / Office 365) deep link — same idea. */
function outlookCalUrl(ev) {
  const params = new URLSearchParams({
    path:    '/calendar/action/compose',
    rru:     'addevent',
    subject: ev.name,
    startdt: new Date(ev.start).toISOString(),
    enddt:   new Date(ev.start + 2*60*60*1000).toISOString(),
    body:    `${ev.description}\n\nhttps://thescrambledlegs.com/events/${ev.id}`,
    location: ev.startLoc.label,
  });
  return `https://outlook.live.com/calendar/0/deeplink/compose?${params.toString()}`;
}

function downloadIcs(ev) {
  const fmtIcs = (ts) => new Date(ts).toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const start = fmtIcs(ev.start);
  const end   = fmtIcs(ev.start + 2*60*60*1000);
  const body =
`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Scrambled Legs//Calendar//EN
BEGIN:VEVENT
UID:${ev.id}@thescrambledlegs.com
DTSTAMP:${fmtIcs(Date.now())}
DTSTART:${start}
DTEND:${end}
SUMMARY:${ev.name}
DESCRIPTION:${ev.description.replace(/\n/g,'\\n')}
LOCATION:${ev.startLoc.label}
GEO:${ev.startLoc.lat};${ev.startLoc.lng}
URL:https://thescrambledlegs.com/events/${ev.id}
END:VEVENT
END:VCALENDAR`;
  const blob = new Blob([body], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${ev.id}.ics`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}

/* Share — uses Web Share API on Android/iOS (native share sheet picks the right
   destination: Messages, Mail, Slack, etc.). Falls back to clipboard on desktop.
   The shared URL points at /events/{id} which on production will have OG meta
   tags so the link unfurls into a rich preview in iMessage/Slack/Discord/etc. */
async function shareEvent(ev) {
  const url = `https://thescrambledlegs.com/events/${ev.id}`;
  const title = `${ev.name} · Scrambled Legs`;
  const text =
`${ev.name}
🗓  ${fmtDateLong(ev.start)} · ${fmtTime(ev.start)}
📍 ${ev.startLoc.label}${ev.rideLeader ? `
🌭 Led by ${ev.rideLeader.name}` : ''}

Join us at thescrambledlegs.com`;

  if (navigator.share) {
    try { await navigator.share({ title, text, url }); return; } catch(e) { /* user cancelled */ return; }
  }
  const fallback = `${title}\n\n${text}\n\n${url}`;
  try {
    await navigator.clipboard.writeText(fallback);
    alert('Link copied to clipboard');
  } catch (e) {
    prompt('Copy this:', fallback);
  }
}

/* Identify the route source for the title-attribute hint only — the visible
   button label stays generic ("View Route") since the source can be anything
   the admin pastes. */
function routeSource(url) {
  if (!url) return null;
  try {
    const host = new URL(url).hostname.toLowerCase();
    if (host.includes('strava'))      return 'Strava';
    if (host.includes('ridewithgps')) return 'Ride with GPS';
    if (host.includes('trailforks'))  return 'Trailforks';
    if (host.includes('komoot'))      return 'Komoot';
    if (host.includes('garmin'))      return 'Garmin Connect';
    if (url.toLowerCase().endsWith('.gpx')) return 'GPX file';
    return null;
  } catch { return null; }
}

/* ─── Open-Meteo weather (real data, free, no API key, ~10K calls/day limit)
   Caches per (lat,lng,event-hour-bucket) in localStorage for 30 minutes so
   re-renders / lifecycle simulations don't re-fetch. Falls back silently to
   the mock weather baked into EVENT_SEED if the network/API fails. */
const WMO_CODE = {
  0:  ['☀️',  'Clear'],
  1:  ['🌤',  'Mostly clear'],
  2:  ['⛅',  'Partly cloudy'],
  3:  ['☁️',  'Overcast'],
  45: ['🌫',  'Fog'],
  48: ['🌫',  'Freezing fog'],
  51: ['🌦',  'Light drizzle'],
  53: ['🌦',  'Drizzle'],
  55: ['🌧',  'Heavy drizzle'],
  61: ['🌧',  'Light rain'],
  63: ['🌧',  'Rain'],
  65: ['🌧',  'Heavy rain'],
  71: ['🌨',  'Light snow'],
  73: ['🌨',  'Snow'],
  75: ['❄️',  'Heavy snow'],
  77: ['🌨',  'Snow grains'],
  80: ['🌦',  'Rain showers'],
  81: ['🌧',  'Heavy showers'],
  82: ['⛈',  'Violent showers'],
  85: ['🌨',  'Snow showers'],
  86: ['❄️',  'Heavy snow showers'],
  95: ['⛈',  'Thunderstorm'],
  96: ['⛈',  'Thunderstorm + hail'],
  99: ['⛈',  'Severe thunderstorm'],
};

async function fetchWeather(lat, lng, eventStartMs) {
  const startDate = new Date(eventStartMs);
  const dateStr = `${startDate.getFullYear()}-${String(startDate.getMonth()+1).padStart(2,'0')}-${String(startDate.getDate()).padStart(2,'0')}`;
  const cacheKey = `sl_wx_${lat.toFixed(3)}_${lng.toFixed(3)}_${dateStr}_${startDate.getHours()}`;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    try {
      const obj = JSON.parse(cached);
      if (obj.expires > Date.now()) return obj.data;
    } catch {}
  }

  const daysOut = (eventStartMs - Date.now()) / 86400000;
  // Open-Meteo only forecasts ~14 days, but we tighten the user-facing
  // horizon to 10 days for predictable UX (forecasts get noisy past then).
  if (daysOut > 10) return null;

  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${lat}&longitude=${lng}`
    + `&hourly=temperature_2m,weather_code,wind_speed_10m,precipitation_probability`
    + `&daily=sunset`
    + `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`
    + `&start_date=${dateStr}&end_date=${dateStr}`;

  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const json = await res.json();
    const hour = startDate.getHours();
    const code = json.hourly.weather_code[hour];
    const [icon, desc] = WMO_CODE[code] || ['🌤', 'Forecast'];
    const data = {
      temp:   Math.round(json.hourly.temperature_2m[hour]),
      icon,
      desc,
      code,
      wind:   Math.round(json.hourly.wind_speed_10m[hour]),
      precip: json.hourly.precipitation_probability[hour] ?? 0,
      sunset: json.daily?.sunset?.[0] || null,
      real:   true,
    };
    localStorage.setItem(cacheKey, JSON.stringify({ data, expires: Date.now() + 30*60*1000 }));
    return data;
  } catch {
    return null;
  }
}

let featuredMap = null;
let countdownTimer = null;

function renderFeatured() {
  const slot = document.getElementById('featured-slot');
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  if (featuredMap)    { featuredMap.remove(); featuredMap = null; }

  if (!events.length) {
    slot.innerHTML = `
      <div class="empty">
        <div class="em">🥚</div>
        <div class="head">No rides on the books</div>
        <div class="sub">Check back soon — the crew schedules new rides every week.</div>
      </div>`;
    return;
  }

  const ev = events[0];
  const status = getStatus(ev);
  if (status === 'archived') { events.shift(); renderFeatured(); return; }

  const headerVisual = ev.banner
    ? `<div class="featured-banner" style="background-image: url('${ev.banner}')"></div>`
    : `<div class="featured-map" id="feat-map"></div>`;

  const rideLeaderBlock = ev.rideLeader ? `
    <div class="rl-overlay">
      <div class="rl-avatar">
        <img class="rl-photo" src="${ev.rideLeader.photo}" alt="${ev.rideLeader.name}" />
        <div class="rl-crown-orbit"><span class="rl-crown">👑</span></div>
      </div>
      <div class="rl-meta">
        <span class="rl-label">Ride Leader</span>
        <span class="rl-name">${ev.rideLeader.name}</span>
      </div>
    </div>` : '';

  slot.innerHTML = `
    <div class="featured">
      ${headerVisual}
      <div class="status-chip" data-status="${status}">
        <span class="dot"></span><span>${STATUS_LABEL[status]}</span>
      </div>
      ${weatherInRange(ev.start) ? `
      <div class="weather-chip" title="Forecast for trailhead">
        <span>${ev.weather.icon}</span>
        <span>${ev.weather.temp}°</span>
      </div>` : ''}
      ${rideLeaderBlock}
      <div class="featured-body${ev.rideLeader ? ' has-rl' : ''}">
        <div class="event-name">${ev.name}</div>
        <div class="event-meta">
          <span>${ICONS.cal}${fmtDateLong(ev.start)}</span>
          <span>${ICONS.clock}${fmtTime(ev.start)}</span>
          <span>${ICONS.pin}${ev.startLoc.label}</span>
        </div>
        <div class="tags">
          <span class="tag diff-${ev.difficulty}">${ev.difficultyLabel}</span>
          <span class="tag">${ev.distance}</span>
          <span class="tag">${ev.elevation}</span>
        </div>
        <div class="event-desc">${ev.description}</div>

        ${weatherInRange(ev.start) ? `
        <div class="weather-panel is-loading" id="weather-panel">
          <span class="weather-icon-big" id="wx-icon">${ev.weather.icon}</span>
          <div>
            <span class="weather-temp-big" id="wx-temp">${ev.weather.temp}°</span>
          </div>
          <div class="weather-details">
            <span class="weather-desc" id="wx-desc">${ev.weather.desc}</span>
            <span class="weather-extra" id="wx-extra"><span>—</span></span>
          </div>
          <span class="weather-source" id="wx-source">forecast loading…</span>
        </div>` : `
        <div class="evt-weather-fallback">Forecast available 10 days before the ride</div>`}

        <div class="countdown-block">
          <div class="countdown-label" id="cd-label">${status === 'upcoming' ? 'Starts in' : 'Status'}</div>
          <div class="countdown-display" id="cd-display"></div>
        </div>

        <div class="actions-grid">
          <a class="action-btn" href="${directionsUrl(ev)}" target="_blank" rel="noopener noreferrer">
            ${ICONS.nav}<span>Directions</span>
          </a>
          ${ev.routeUrl ? `
          <a class="action-btn" href="${ev.routeUrl}" target="_blank" rel="noopener noreferrer" title="${routeSource(ev.routeUrl) ? 'Opens in ' + routeSource(ev.routeUrl) : 'Opens in a new tab'}">
            ${ICONS.route}<span>Route</span>
          </a>` : ''}
          <button class="action-btn" id="ics-btn">${ICONS.cal}<span>Calendar</span></button>
          <button class="action-btn" id="share-btn">${ICONS.share}<span>Share</span></button>
        </div>

        <div class="kudos-row">
          <button class="hd-cta" id="kudos-btn" data-intensity="0" title="Mash for hot doggy dog love">
            <div class="hd-cta-top">
              <span class="hd-cta-emoji">🌭</span>
              <span class="hd-cta-count" id="kudos-count">${fmtCount(ev.hotdogs)}</span>
            </div>
            <span class="hd-cta-text" id="kudos-text">Mash me</span>
          </button>
          <div class="hd-cta-mash" id="kudos-mash">
            <span class="mash-num" id="kudos-mash-num">+1</span>
            <span class="mash-sub" id="kudos-mash-sub"></span>
          </div>
        </div>
      </div>
    </div>
  `;

  /* fire weather fetch (don't await — UI shows mock immediately, swaps in real
     data when it arrives). Skip entirely if we didn't render the panel. */
  if (weatherInRange(ev.start)) fetchWeather(ev.startLoc.lat, ev.startLoc.lng, ev.start).then(w => {
    const panel = document.getElementById('weather-panel');
    if (!panel) return;
    panel.classList.remove('is-loading');
    if (w) {
      document.getElementById('wx-icon').textContent  = w.icon;
      document.getElementById('wx-temp').textContent  = `${w.temp}°`;
      document.getElementById('wx-desc').textContent  = w.desc;
      const parts = [];
      parts.push(`<span>💨 ${w.wind} mph</span>`);
      parts.push(`<span class="${w.precip >= 50 ? 'warn' : ''}">💧 ${w.precip}% rain</span>`);
      if (w.sunset) {
        const sunsetTime = new Intl.DateTimeFormat(undefined, { hour: 'numeric', minute: '2-digit' }).format(new Date(w.sunset));
        parts.push(`<span>🌅 ${sunsetTime}</span>`);
      }
      document.getElementById('wx-extra').innerHTML = parts.join('');
      document.getElementById('wx-source').textContent = 'open-meteo';
      // also refresh the small chip on the banner
      const chipIcon = slot.querySelector('.weather-chip span:first-child');
      const chipTemp = slot.querySelector('.weather-chip span:last-child');
      if (chipIcon) chipIcon.textContent = w.icon;
      if (chipTemp) chipTemp.textContent = `${w.temp}°`;
    } else {
      // Open-Meteo wouldn't forecast (>14 days out) or network failed
      document.getElementById('wx-source').textContent = 'forecast available 14d out';
      document.getElementById('wx-extra').innerHTML = `<span>${ev.weather.desc}</span>`;
    }
  });

  if (!ev.banner) {
    setTimeout(() => {
      featuredMap = L.map('feat-map', {
        zoomControl: false, attributionControl: false, scrollWheelZoom: false, dragging: false, tap: false
      }).setView([ev.startLoc.lat, ev.startLoc.lng], 13);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains:'abcd', maxZoom:19 }).addTo(featuredMap);
      const yolkIcon = L.divIcon({ className: 'pin-yolk', iconSize: [18,18], iconAnchor: [9,9] });
      L.marker([ev.startLoc.lat, ev.startLoc.lng], { icon: yolkIcon }).addTo(featuredMap);
      if (ev.startLoc.lat !== ev.endLoc.lat || ev.startLoc.lng !== ev.endLoc.lng) {
        L.marker([ev.endLoc.lat, ev.endLoc.lng], { icon: yolkIcon }).addTo(featuredMap);
        L.polyline([[ev.startLoc.lat, ev.startLoc.lng], [ev.endLoc.lat, ev.endLoc.lng]],
          { color: '#FFC72C', weight: 3, opacity: 0.7, dashArray: '6 8' }).addTo(featuredMap);
        featuredMap.fitBounds([[ev.startLoc.lat, ev.startLoc.lng], [ev.endLoc.lat, ev.endLoc.lng]], { padding: [40,40] });
      }
    }, 30);
  }

  function tick() {
    const s = getStatus(ev);
    const display = document.getElementById('cd-display');
    const label   = document.getElementById('cd-label');
    if (!display) return;

    if (s === 'archived') {
      events.shift(); renderFeatured(); renderArchive(); return;
    }

    display.classList.toggle('is-progress', s === 'in_progress');
    display.classList.toggle('is-beers',    s === 'beers');

    if (s === 'upcoming') {
      label.textContent = 'Starts in';
      display.innerHTML = fmtCountdown(ev.start - Date.now());
    } else if (s === 'in_progress') {
      label.textContent = 'Status';
      display.innerHTML = `🚴 In progress <span class="sep">·</span> ${fmtTimeSince(Date.now() - ev.start)}`;
    } else if (s === 'beers') {
      label.textContent = 'Status';
      display.innerHTML = `🍺 Beers being consumed`;
    }
    const chip = slot.querySelector('.status-chip');
    if (chip && chip.dataset.status !== s) {
      chip.dataset.status = s;
      chip.querySelector('span:last-child').textContent = STATUS_LABEL[s];
    }
  }
  tick();
  countdownTimer = setInterval(tick, 1000);

  document.getElementById('ics-btn').addEventListener('click',   () => openCalSheet(ev));
  document.getElementById('share-btn').addEventListener('click', () => shareEvent(ev));
  document.getElementById('kudos-btn').addEventListener('click', (e) => onKudosClick(e.currentTarget, ev));
  enterIdleState(document.getElementById('kudos-btn'));

  // start idle text rotation for the hot dog CTA
  startHdIdleRotation();
}

/* ─── Add-to-calendar sheet wiring ─── */
function openCalSheet(ev) {
  const sheet = document.getElementById('cal-sheet');
  document.getElementById('cal-google').href = googleCalUrl(ev);
  document.getElementById('cal-outlook').href = outlookCalUrl(ev);
  const appleBtn = document.getElementById('cal-apple');
  appleBtn.onclick = () => { downloadIcs(ev); closeCalSheet(); };
  // Auto-close Google/Outlook after click (they open in new tab)
  document.getElementById('cal-google').onclick  = () => setTimeout(closeCalSheet, 100);
  document.getElementById('cal-outlook').onclick = () => setTimeout(closeCalSheet, 100);
  sheet.removeAttribute('hidden');
}
function closeCalSheet() {
  document.getElementById('cal-sheet').setAttribute('hidden', '');
}
document.getElementById('cal-cancel').addEventListener('click',   closeCalSheet);
document.getElementById('cal-backdrop').addEventListener('click', closeCalSheet);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCalSheet(); });

    </div>
    ${upcoming.length > INITIAL_COMING && !comingExpanded
      ? `<button class="show-more" id="show-more-btn">Show ${upcoming.length - INITIAL_COMING} more</button>`
      : ''}
  `;
  // Wire up tap handlers — unlocked → modal, locked → toast
  slot.querySelectorAll('.coming-card').forEach((card) => {
    const idx = Number(card.dataset.evtIdx);
    const ev = visible[idx];
    if (!ev) return;
    const handler = () => {
      if (ev.unlocked) openEventByRoute(ev.id);
      else showLockToast();
    };
    card.addEventListener('click', handler);
    if (ev.unlocked) {
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
      });
    }
  });
  const btn = document.getElementById('show-more-btn');
  if (btn) btn.addEventListener('click', () => { comingExpanded = true; renderComing(); });
}

/* ════════════════════════════════════════════════════════════════
   EVENT URL ROUTING
   ────────────────────────────────────────────────────────────────
   Any event is shareable via /events/{id}. Visiting that URL auto-opens
   the event detail sheet on top of the home page. Works for locked,
   unlocked, featured, and past events alike — sharing implies intent
   to expose the event regardless of its public lock state.

   Mockup uses a hash route (#/events/{id}) since this is a static file.
   In production with React Router:

     <Route path="/events/:eventId" element={<EventDetail />} />

   …where <EventDetail /> mounts on Home, finds the event in the live
   /events Firebase subscription, and calls the same openEventSheet()
   logic. The 404.html SPA-redirect fallback (already in /public) makes
   /events/abc123 deep links work on GitHub Pages page-refresh.

   Share button URLs (`https://thescrambledlegs.com/events/{id}`) hit
   that route on the production site; on the mockup we encode the same
   info as a hash for shareability without a server.
   ════════════════════════════════════════════════════════════════ */
function findEventById(id) {
  return [...events, ...pastEvents].find(e => e.id === id) || null;
}
function openEventByRoute(id, opts = {}) {
  const ev = findEventById(id);
  if (!ev) return false;
  openEventSheet(ev);
  if (!opts.fromPopState) {
    history.pushState({ eventId: id }, '', `#/events/${id}`);
  }
  return true;
}
function syncFromHash(opts = {}) {
  const m = location.hash.match(/^#\/events\/([^/?&]+)/);
  if (m) {
    openEventByRoute(decodeURIComponent(m[1]), opts);
  } else {
    closeEventSheet({ fromPopState: !!opts.fromPopState });
  }
}
window.addEventListener('popstate', () => syncFromHash({ fromPopState: true }));

      <div class="arch-name">${p.name}</div>

}

function setHdText(text, modifier, el) {

  // featured-card ID lookup if omitted.
