/* No-op placeholders kept so renderFeatured() can still call startHdIdleRotation
   without changes; idle is now static. */
function startHdIdleRotation() { /* static idle now */ }
function stopHdIdleRotation()  { /* no-op */ }

/* Drive the global ambient mash-mode effects — vignette, page-header bounce,
   section-label fade, and the shockwave text dislodging. Two ramps:
   - --mash-energy: 0 → 1 over presses 1–25 (doubled from prior 1–50).
     By press 25 the vignette is already fully closed in.
   - --mash-overdrive: 0 → 1 over presses 50–100. Drives the additional
     "page is broken" displacement past the energy cap. */
function setMashEnergy(pressCount) {
  const energy    = Math.min(Math.max(pressCount / 25, 0), 1);
  const overdrive = Math.min(Math.max((pressCount - 50) / 50, 0), 1);
  document.body.style.setProperty('--mash-energy',    energy.toFixed(3));
  document.body.style.setProperty('--mash-overdrive', overdrive.toFixed(3));
  // Toggle data flags that gate the layered cinematic effects
  if (pressCount > 0)  document.body.dataset.mashing = '1';
  else                 delete document.body.dataset.mashing;
  if (pressCount >= 50) document.body.dataset.eggsRainbow = '1';
  else                  delete document.body.dataset.eggsRainbow;
}

/* Rainbow probability for hot dogs / eggs — none until press 25, full at
   press 100, linear ramp in between. */
function rainbowChance(pressCount) {
  if (pressCount < 25)  return 0;
  if (pressCount >= 100) return 1;
  return (pressCount - 25) / 75;
}

/* Random rainbow egg spawn — fires at 25+ on a per-click chance. Same
   physics as hot dogs but uses the 🥚 emoji and is always rainbow. */
function spawnRainbowEgg(originBtn) {
  if (activeHotDogs >= MAX_ACTIVE_HOTDOGS) return;
  activeHotDogs++;
  const rect = originBtn.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const angle = Math.random() * Math.PI * 2;
  const dx = Math.cos(angle);
  const dy = Math.sin(angle);
  const halfW = Math.max(rect.width  / 2, 1);
  const halfH = Math.max(rect.height / 2, 1);
  const t = Math.min(halfW / Math.abs(dx || 1e-6), halfH / Math.abs(dy || 1e-6));
  const startX = cx + dx * t;
  const startY = cy + dy * t;
  const dist = 220 + Math.random() * 280;
  const endDx = dx * dist;
  const endDy = dy * dist;
  const rot   = (Math.random() - 0.5) * 720;
  const dur   = 1900 + Math.random() * 1300;

  const eg = document.createElement('div');
  eg.className = 'flying-egg is-rainbow';
  eg.textContent = '🥚';
  eg.style.left = startX + 'px';
  eg.style.top  = startY + 'px';
  document.body.appendChild(eg);

  eg.animate(
    [
      { transform: 'translate(-50%,-50%) scale(0.2) rotate(0deg)',                                                  opacity: 0,    offset: 0    },
      { transform: `translate(calc(-50% + ${dx*8}px), calc(-50% + ${dy*8}px)) scale(1) rotate(${rot*0.1}deg)`,        opacity: 1,    offset: 0.12 },
      { transform: `translate(calc(-50% + ${endDx*0.6}px), calc(-50% + ${endDy*0.6}px)) scale(1) rotate(${rot*0.6}deg)`, opacity: 0.85, offset: 0.6  },
      { transform: `translate(calc(-50% + ${endDx}px), calc(-50% + ${endDy}px)) scale(1) rotate(${rot}deg)`,         opacity: 0,    offset: 1    },
    ],
    { duration: dur, easing: 'cubic-bezier(.22,.61,.36,1)', fill: 'forwards' }
  ).onfinish = () => { eg.remove(); activeHotDogs--; };
}

/* Background flash — starts at press 10 (barely a flicker) and ramps to
   full intensity by press 50. Very apparent by 50, dramatic by 100. */
function flashBackground(pressCount) {
  if (pressCount < 10) return;
  const flash = document.getElementById('mash-flash');
  if (!flash) return;
  const hue = (pressCount * 47) % 360;
  const intensity = Math.min((pressCount - 10) / 40, 1);   // 0 at press 10 → 1 at press 50+
  flash.animate(
    [
      { backgroundColor: `hsl(${hue}, 95%, 55%)`, opacity: 0.05 + intensity * 0.50 },
      { opacity: 0 }
    ],
    { duration: 220, easing: 'ease-out' }
  );
}

/* FIRE — mixes in at press 25+, separate pool so it always has representation */
const FIRE_EMOJIS = ['🔥','🔥','🔥','💥','🌋','⚡'];   // weighted toward 🔥

/* FARM CHAOS POOL — starts at press 25, ramps to 65% of spawns by 100+. */
const FARM_EMOJIS = [
  '🐄','🐔','🐷','🐑','🐓','🦆','🐰','🐎','🦃','🌽',
  '🥕','🚜','🌾','🐸','🦉',
];

/* FULL CHAOS — random slice of the emoji spectrum, introduced at press 50+. */
const CHAOS_EMOJIS = [
  '🎉','🎊','🎈','🌈','⭐','🌟','💥','✨','💫','🎯',
  '🏆','🥇','🎪','🎭','🎨','🎬','🎮','🎲','🃏','🍕',
  '🍔','🌮','🍜','🍣','🍦','🍩','🎂','🚀','✈️','🚂',
  '🏎️','🌊','💨','🌪️','🌩️','🦄','🐉','🦋','🐬','🦁',
  '🐯','🦊','🦅','💎','🔮','🗝️','⚔️','🛡️','🏰','🌋',
  '🌸','🌺','🌻','🌹','🍀','🍄','🌙','☀️','🎸','🥁',
  '🏄','🧗','🤿','🪂','⛷️','🏇','🥊','🎳','🎯','🎰',
];

/* DIVERSE PEOPLE POOL — at 100+ presses, 25% of spawns become diverse
   human emojis (cyclists, athletes, celebrants across skin tones). */
const DIVERSE_EMOJIS = [
  '🚴🏿','🚴🏾','🚴🏽','🚴🏼',   // cyclists — on brand
  '🏃🏿','🏃🏾','🏃🏽',           // runners
  '🤸🏿','🤸🏾','🤸🏽',           // acrobatics
  '💪🏿','💪🏾','💪🏽',           // muscle flex
  '🙌🏿','🙌🏾','🙌🏽',           // celebrating
  '🧑🏿','👩🏿','👨🏿',           // people, dark skin
  '🧑🏽','👩🏽','👨🏽',           // people, medium skin
];

/* How much of each spawn should be farm chaos at this press count.
   Starts at press 25, ramps to 65% by press 100+. */
function farmMixRatio(pressCount) {
  if (pressCount < 25) return 0;
  return Math.min((pressCount - 25) / 75 * 0.65, 0.65);
}

function pickSpawnEmoji(pressCount) {
  // 100+: 25% diverse people emojis
  if (pressCount >= 100 && Math.random() < 0.25)
    return DIVERSE_EMOJIS[Math.floor(Math.random() * DIVERSE_EMOJIS.length)];
  // 50+: 20% full-chaos random emoji
  if (pressCount >= 50 && Math.random() < 0.20)
    return CHAOS_EMOJIS[Math.floor(Math.random() * CHAOS_EMOJIS.length)];
  // 25+: ~15% fire
  if (pressCount >= 25 && Math.random() < 0.15)
    return FIRE_EMOJIS[Math.floor(Math.random() * FIRE_EMOJIS.length)];
  // Farm chaos ramps from press 25
  if (Math.random() < farmMixRatio(pressCount))
    return FARM_EMOJIS[Math.floor(Math.random() * FARM_EMOJIS.length)];
  return '🌭';
}

/* Shockwave — on every click, re-roll random per-element offsets so each
   tap visibly jolts the page. Same CSS variables get scaled by the global
   energy + overdrive for the magnitude. */
const SHOCKWAVE_SELECTOR = [
  '.page-header h1', '.page-header p',
  '.section-label',
  '.event-name', '.event-meta span',
  '.event-desc', '.tags .tag',
  '.coming-card', '.coming-card .name', '.coming-card .meta',
  '.coming-card .date-stamp .day',
  '.coming-card .date-stamp .month',
  '.coming-card .date-stamp .weekday',
  '.archive-toggle',
  '.archive-card .arch-name',
  '.archive-card .arch-date',
  '.archive-card .arch-kudos',
  '.weather-desc', '.weather-extra', '.countdown-display', '.countdown-label',
].join(',');

function applyShockwave() {
  const els = document.querySelectorAll(SHOCKWAVE_SELECTOR);
  els.forEach(el => {
    // Only set transform variables — never letter-spacing, which causes
    // layout reflow and pushes the kudos row out of position.
    el.style.setProperty('--jx', ((Math.random() - 0.5) * 2).toFixed(2));
    el.style.setProperty('--jy', ((Math.random() - 0.5) * 2).toFixed(2));
    el.style.setProperty('--jr', ((Math.random() - 0.5) * 2).toFixed(2));
  });
}

function clearShockwave() {
  const els = document.querySelectorAll(SHOCKWAVE_SELECTOR);
  els.forEach(el => {
    el.style.removeProperty('--jx');
    el.style.removeProperty('--jy');
    el.style.removeProperty('--jr');
  });
}

/* Set the button to its emergency-button idle state — big centered "MASH ME"
   in the overlay, top + right hidden, glowing pulse. Called on render and
   after a save/burn cycle resets. */
function enterIdleState(btn) {
  if (!btn) return;
  const row = btn.closest('.kudos-row');
  if (!row) return;
  btn.classList.remove('is-mashing', 'is-deep-mashing', 'is-saving', 'is-burning');
  btn.classList.add('is-idle');
  btn.dataset.intensity = '0';
  btn.style.setProperty('--hd-rest', '1');
  btn.style.removeProperty('--hd-hue');
  const numEl = row.querySelector('.mash-num');
  const subEl = row.querySelector('.mash-sub');
  if (numEl) {
    numEl.style.fontSize = '';   // let the .is-idle CSS rule drive the size
    numEl.textContent = 'MASH ME';
  }
  if (subEl) setSub(subEl, '');
  setMashEnergy(0);              // clear any lingering vignette / bounce
  clearShockwave();              // un-dislodge any displaced text
}

function onKudosClick(btn, ev) {
  // While the save/burn animation is playing, the button is locked — clicks
  // are ignored. CSS also sets pointer-events: none on those classes for
  // belt-and-suspenders. This prevents the "saving 0" edge case where a
  // mid-flight reset would zero the press counter underneath a fresh click.
  if (btn.classList.contains('is-saving') || btn.classList.contains('is-burning')) return;

  // Leave idle on the very first press so "MASH ME" can transition out.
  btn.classList.remove('is-idle');

  // 1. counts + element lookups relative to this button so the same
  //    handler works for the featured card AND the unlocked-event modal.
  ev.hotdogs += 1;
  hdPressCount += 1;            // increment first so every visual ramp downstream uses the new count
  kudosPendingDelta += 1;
  // mash + sub are now SIBLINGS of the button inside .kudos-row, so they're
  // not affected by the button's scale transform — they stay anchored to
  // the row (= inside the event card) while the button grows beyond bounds.
  const row     = btn.closest('.kudos-row');
  const countEl = btn.querySelector('.hd-cta-count');
  const textEl  = btn.querySelector('.hd-cta-text');
  const mashEl  = row.querySelector('.hd-cta-mash');
  const numEl   = mashEl.querySelector('.mash-num');
  const subEl   = row.querySelector('.mash-sub');
  countEl.textContent = fmtCount(ev.hotdogs);

  // 2. ping ripple
  const ping = document.createElement('span');
  ping.className = 'ping';
  btn.appendChild(ping);
  setTimeout(() => ping.remove(), 500);

  // 3. flying hot dogs — count = current burst press count, capped at 25
  //    for rendering performance. Each spawn rolls independently for the
  //    rainbow treatment based on rainbowChance(pressCount).
  const dogCount = Math.min(hdPressCount, 25);
  const stagger  = Math.max(12, Math.floor(800 / dogCount));
  const pRainbow = rainbowChance(hdPressCount);
  for (let i = 0; i < dogCount; i++) {
    const rainbow = Math.random() < pRainbow;
    setTimeout(() => spawnHotDog(btn, { rainbow }), i * stagger);
  }
  spawnPhrase(btn);

  // 3b. Rainbow eggs — at press 25+, ~30% chance per click to spit out
  //     1-2 rainbow 🥚 alongside the dogs.
  if (hdPressCount >= 25 && Math.random() < 0.30) {
    const eggCount = Math.random() < 0.4 ? 2 : 1;
    for (let i = 0; i < eggCount; i++) {
      setTimeout(() => spawnRainbowEgg(btn), i * 60);
    }
  }

  // 3c. Background flash — at press 100+, every click strobes a color
  //     burst behind the vignette. Bleeds through the clear center.
  flashBackground(hdPressCount);

  // 4. unhinged continuous growth via transforms only (no padding ramp so
  //    the layout box stays put and overlays stay anchored).
  //    --hd-rest: uniform scale ramps with every press
  //    --hd-rest-y: extra vertical-only stretch so the button takes over
  //                 the screen vertically inside the vignette tunnel.
  const restScale  = 1 + hdPressCount * 0.022;
  const restScaleY = 1 + hdPressCount * 0.014;
  btn.style.setProperty('--hd-rest',   restScale.toFixed(3));
  btn.style.setProperty('--hd-rest-y', restScaleY.toFixed(3));
  btn.style.setProperty('--hd-pad-y', '14px');

  // 5. PRISM COLOR CYCLE — hue advances ~14° per press, full cycle every ~26
  //    presses. CSS gradient is driven by the --hd-hue var.
  const hue = (hdPressCount * 14) % 360;
  btn.style.setProperty('--hd-hue', String(hue));

  // 5b. AMBIENT MASH ENERGY — vignette closes in (energy 0 → 1 over 25
  //     presses, doubled), page header bounces, sections fade.
  //     OVERDRIVE — text displacement keeps growing 50 → 100 presses.
  setMashEnergy(hdPressCount);

  // 5c. SHOCKWAVE — re-roll random per-element offsets so every click
  //     visibly jolts the page. Magnitude scales with energy + overdrive
  //     so press 1 is barely a wiggle and press 100 looks broken.
  applyShockwave();

  // 6. STROBE — quick brightness/saturation flash on every click; intensity
  //    grows with the press count.
  const strobeBoost = 1.5 + Math.min(hdPressCount * 0.04, 1.5);   // 1.5 → 3.0
  btn.animate(
    [
      { filter: `brightness(${strobeBoost.toFixed(2)}) saturate(${strobeBoost.toFixed(2)})` },
      { filter: 'brightness(1) saturate(1)' }
    ],
    { duration: 160, easing: 'ease-out' }
  );

  // 7. center +N — scales up with press count, capped so the text stays
  //    within bounds. Visible from press 1 (no deep-mash gate). No click
  //    bump — the +N stays rock-solid stable; the chaos happens around it.
  btn.classList.remove('is-saving', 'is-burning');
  btn.classList.add('is-mashing');
  numEl.style.removeProperty('font-size');
  numEl.textContent = `+${fmtCount(hdPressCount)}`;
  const numSize = 30 + Math.min(hdPressCount * 1.3, 40);   // 30 → 70px (capped)
  numEl.style.fontSize = `${numSize}px`;
  mashEl.style.setProperty('--mash-scale', '1');           // permanently disable spring

  // 8. challenge text — gated update strategy:
  //    Press 1-25: refresh every press (deterministic hand-tuned ladder).
  //    Press 26+:  refresh every KUDOS_CHALLENGE_DWELL_MS (2.5s) so the user
  //                has time to actually read each long-haul taunt before it
  //                changes. The +N counter and visual intensity still update
  //                on every press regardless.
  btn.dataset.intensity = String(bandForPress(hdPressCount));

  const now = Date.now();
  const isHandTuned = hdPressCount <= HD_FIRST_25.length;
  const shouldRefreshChallenge =
    isHandTuned || (now - hdLastChallengeAt >= KUDOS_CHALLENGE_DWELL_MS);

  if (shouldRefreshChallenge) {
    let challenge;
    if (isHandTuned) {
      // Deterministic — never re-roll (would infinite-loop)
      challenge = pickChallenge(hdPressCount);
    } else {
      let attempts = 0;
      do {
        challenge = pickChallenge(hdPressCount);
        attempts++;
      } while (
        challenge === hdLastChallenge
        && HD_CHALLENGE_BANDS[bandForPress(hdPressCount)].length > 1
        && attempts < 10                       // hard cap so we can NEVER loop forever
      );
    }
    hdLastChallenge = challenge;
    hdLastChallengeAt = now;

    // 9. From press 1, the challenge phrase always lives in the mash-sub
    //    slot anchored to the bottom of the row (rock-solid, fixed size,
    //    not affected by button growth or shockwave). The right-side
    //    in-button text stays empty during any mashing state.
    setSub(subEl, challenge);
    setHdText('', null, textEl);
  }
  // is-deep-mashing class still toggles for any band-styling that uses it
  // (none currently, but kept for forward-compat).
  if (hdPressCount >= DEEP_MASH_THRESHOLD) {
    btn.classList.add('is-deep-mashing');
  } else {
    btn.classList.remove('is-deep-mashing');
  }

  // 10. saving → burn → reset sequence
  if (hdResetTimer) clearTimeout(hdResetTimer);
  hdResetTimer = setTimeout(() => {
    // Defensive guard — should never happen now that clicks are locked
    // during saving/burning, but if hdPressCount is somehow 0 here, skip
    // straight back to idle without rendering "saving 0".
    if (hdPressCount <= 0) {
      btn.classList.remove('is-mashing', 'is-deep-mashing', 'is-saving', 'is-burning');
      btn.dataset.intensity = '0';
      btn.style.setProperty('--hd-rest', '1');
      btn.style.setProperty('--hd-pad-y', '14px');
      btn.style.removeProperty('--hd-hue');
      numEl.style.fontSize = '';
      numEl.textContent = '+1';
      subEl.textContent = '';
      setHdText(HD_IDLE_TEXT, undefined, textEl);
      return;
    }

    // PHASE A — saving (2.5s after last press)
    btn.classList.remove('is-mashing', 'is-deep-mashing');
    btn.classList.add('is-saving');
    numEl.textContent = `saving ${fmtCount(hdPressCount)}`;
    numEl.style.fontSize = '28px';
    subEl.textContent = '';

    setTimeout(() => {
      // PHASE B — 2-second burn flash with a taunt. All ambient mash effects
      // clear here (vignette fades, header stops bouncing) so the user is
      // left with just the centered taunt — clean, focused, intentional.
      btn.classList.remove('is-saving');
      btn.classList.add('is-burning');
      // Effects (vignette, shockwave, rainbow eggs) stay at full strength
      // through the burn message so the user sees the taunt surrounded by
      // darkness. Everything resets in PHASE C when enterIdleState fires.
      numEl.textContent = pickBurn();
      numEl.style.fontSize = '';      // class-driven sizing for burn

      setTimeout(() => {
        // PHASE C — burn message just finished. NOW snap everything back:
      // vignette clears, shockwave text resets, eggs return to normal,
      // button shrinks back to idle. All clears happen in enterIdleState.
        hdPressCount = 0;
        hdLastChallenge = '';
        hdLastChallengeAt = 0;
        btn.style.setProperty('--hd-rest-y', '1');
        enterIdleState(btn);
        setHdText(HD_IDLE_TEXT, undefined, textEl);
      }, KUDOS_BURN_MS);
    }, KUDOS_SAVE_ANIM_MS);
  }, KUDOS_SAVE_DELAY_MS);

  // 11. debounced flush of pending kudos delta (production: Firebase txn)
  if (kudosDebounceTimer) clearTimeout(kudosDebounceTimer);
  kudosDebounceTimer = setTimeout(() => {
    kudosPendingDelta = 0;
  }, KUDOS_SAVE_DELAY_MS + KUDOS_SAVE_ANIM_MS + KUDOS_BURN_MS);
}

/* Cooldown ring removed — the saving text is sufficient feedback for the
   5-second debounce window now that the kudos UI is a pill instead of a
   circle (a conic-gradient ring around a non-circular shape is awkward). */

/* Global cap on simultaneously-airborne hot dogs. Each spawn registers,
   each completion deregisters. If we hit the cap we silently skip — better
   than locking the browser when the user is mashing very fast. */
let activeHotDogs = 0;
const MAX_ACTIVE_HOTDOGS = 80;

/* Hot dogs spray out from the BUTTON'S PERIMETER in all 360° directions.
   They start at scale(0) on the edge so they appear to emerge from behind
   the button itself, then expand and fly outward. Keeps the button text
   readable in the middle while still feeling like a chaotic dog explosion. */
function spawnHotDog(originBtn, opts = {}) {
  if (activeHotDogs >= MAX_ACTIVE_HOTDOGS) return;
  activeHotDogs++;
  // Override emoji with a farm/chaos pick if the mix ratio calls for it
  if (!opts.emoji) opts.emoji = pickSpawnEmoji(hdPressCount);
  const rect = originBtn.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;

  // Random angle across the full circle
  const angle = Math.random() * Math.PI * 2;
  const dx = Math.cos(angle);
  const dy = Math.sin(angle);

  // Project onto the button's bounding rectangle to find the spawn point
  // exactly on the perimeter at this angle (stretches with button growth).
  const halfW = Math.max(rect.width  / 2, 1);
  const halfH = Math.max(rect.height / 2, 1);
  const t = Math.min(halfW / Math.abs(dx || 1e-6), halfH / Math.abs(dy || 1e-6));
  const startX = cx + dx * t;
  const startY = cy + dy * t;

  // Fly outward by a healthy distance so they clear the button entirely
  const dist = 280 + Math.random() * 320;       // 280 → 600px
  const endDx = dx * dist;
  const endDy = dy * dist;
  const rot   = (Math.random() - 0.5) * 720;
  const dur   = 1700 + Math.random() * 1200;    // 1.7 → 2.9s

  const hd = document.createElement('div');
  hd.className = 'flying-hot-dog' + (opts.rainbow ? ' is-rainbow' : '');
  hd.textContent = opts.emoji || '🌭';
  hd.style.left = startX + 'px';
  hd.style.top  = startY + 'px';
  document.body.appendChild(hd);

  hd.animate(
    [
      // Start tiny + invisible at the edge — looks like emerging from behind the button
      { transform: 'translate(-50%,-50%) scale(0.2) rotate(0deg)',                                                   opacity: 0,    offset: 0    },
      // Pop into full size right at the edge
      { transform: `translate(calc(-50% + ${dx*8}px), calc(-50% + ${dy*8}px)) scale(1) rotate(${rot*0.1}deg)`,        opacity: 1,    offset: 0.12 },
      // Mid-flight — already mostly faded
      { transform: `translate(calc(-50% + ${endDx*0.6}px), calc(-50% + ${endDy*0.6}px)) scale(1) rotate(${rot*0.6}deg)`, opacity: 0.85, offset: 0.6  },
      // Drift to final position, fade out
      { transform: `translate(calc(-50% + ${endDx}px), calc(-50% + ${endDy}px)) scale(1) rotate(${rot}deg)`,          opacity: 0,    offset: 1    },
    ],
    { duration: dur, easing: 'cubic-bezier(.22,.61,.36,1)', fill: 'forwards' }
  ).onfinish = () => { hd.remove(); activeHotDogs--; };
}

/* Phrases — egg-related + motivational. Tap = "I'm coming" so the tone
   should land somewhere between "you're in!" and "send it!". 25 total. */
const PHRASES = [
  "Get crackin'!", "Egg-cellent!", "Sunny side up!", "You rock!",
  "Send it!", "Grease lightning!", "Mustard moves!", "Wheels up!",
  "Yolks on you!", "Hot dog hero!", "Crank it!", "Sender alert!",
  "Scrambled glory!", "Pedal punisher!", "Bun voyage!",
  "You're in! 🥚",     "Roll call answered!", "See you Wednesday!",
  "Yolked + stoked!",  "Eggs-traordinary!",   "Cracked it!",
  "On the roster!",    "Whisk on!",           "Wednesday loading…",
  "Locked and loaded!"
];
const PHRASE_COOLDOWN_MS = 5000;
let lastPhraseIndex = -1;
let phraseCooldownUntil = 0;

function pickPhrase() {
  let i;
  do { i = Math.floor(Math.random() * PHRASES.length); }
  while (i === lastPhraseIndex && PHRASES.length > 1);
  lastPhraseIndex = i;
  return PHRASES[i];
}

function spawnPhrase(btn) {
  const now = Date.now();
  if (now < phraseCooldownUntil) return;
  phraseCooldownUntil = now + PHRASE_COOLDOWN_MS;

  const phrase = pickPhrase();
  const rect = btn.getBoundingClientRect();
  const baseX = rect.left + rect.width/2;
  const baseY = rect.top - 8;
  const charWidth = 16;
  const totalWidth = phrase.length * charWidth;
  const startX = baseX - totalWidth/2;

  [...phrase].forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'phrase-char';
    span.textContent = ch === ' ' ? ' ' : ch;
    span.style.left = (startX + i*charWidth)+'px';
    span.style.top  = baseY+'px';
    document.body.appendChild(span);

    const drift   = (Math.random() - 0.5) * 70;
    const wiggleA = 18 + Math.random()*22;
    const rotA    = (Math.random() - 0.5) * 36;
    /* Total duration ~8.5s. The animation has a deliberate ~3s "read pause"
       early on (offsets 0.05 → 0.40, ≈ 3000ms at 8500ms total) where the
       letters appear and barely move so the user can read the phrase before
       the wiggly explosion takes off. */
    const dur     = 8500 + Math.random()*900 + i*45;
    const delay   = i * 60;

    span.animate(
      [
        { transform: `translate(0, 0) rotate(0deg)`,                                                opacity: 0,    offset: 0    },
        { transform: `translate(0, -34px) rotate(0deg)`,                                            opacity: 1,    offset: 0.05 },
        { transform: `translate(${(Math.random()-0.5)*3}px, -50px) rotate(${(Math.random()-0.5)*3}deg)`, opacity: 1, offset: 0.40 },
        { transform: `translate(${drift*0.25 - wiggleA*0.3}px, -110px) rotate(${rotA*0.4}deg)`,     opacity: 1,    offset: 0.55 },
        { transform: `translate(${drift*0.55 + wiggleA*0.6}px, -220px) rotate(${rotA*0.7}deg)`,     opacity: 1,    offset: 0.72 },
        { transform: `translate(${drift*0.82 - wiggleA*0.4}px, -340px) rotate(${rotA*0.9}deg)`,     opacity: 0.85, offset: 0.88 },
        { transform: `translate(${drift}px, -460px) rotate(${rotA}deg)`,                            opacity: 0,    offset: 1    }
      ],
      { duration: dur, delay, easing: 'cubic-bezier(.22,.61,.36,1)', fill: 'forwards' }
    ).onfinish = () => span.remove();
  });
}

function boot() {
  buildEvents(currentMode);
  renderFeatured();
  renderComing();
  renderArchive();
}
boot();

// If the page loads with /events/{id} in the URL hash, auto-open the sheet
// for that event. Runs after boot() so events are populated.
syncFromHash();
</script>
</body>
