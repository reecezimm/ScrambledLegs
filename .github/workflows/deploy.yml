name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Get all history for better versioning

      - name: Setup Node.js 🔧
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies 📦
        run: npm install

      - name: Compute build stamp 🔢
        id: stamp
        run: |
          echo "num=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build 🏗️
        run: npm run build
        env:
          CI: false # Don't treat warnings as errors
          DISABLE_ESLINT_PLUGIN: true # Disable ESLint during build
          REACT_APP_FIREBASE_VAPID_KEY: ${{ secrets.REACT_APP_FIREBASE_VAPID_KEY }}
          REACT_APP_BUILD_NUM: ${{ steps.stamp.outputs.num }}
          REACT_APP_BUILD_SHA: ${{ steps.stamp.outputs.sha }}
          REACT_APP_BUILD_TIME: ${{ steps.stamp.outputs.time }}

      - name: Copy CNAME to build folder
        run: cp CNAME build/ || echo "No CNAME file found"

      - name: Create .nojekyll file
        run: touch build/.nojekyll

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # The folder the action should deploy
          branch: gh-pages # The branch the action should deploy to
          clean: true # Automatically remove deleted files from the deploy branch
          commit-message: "Deploy website - based on ${{ github.sha }}"
          token: ${{ secrets.GITHUB_TOKEN }}